name: Build and Deploy to Staging

on:
  push:
    branches: [develop]
    paths:
      - 'site/**'
      - 'concepts/**'
      - 'engrams/**'
      - 'customer-pages/**'
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
      
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: false
          command_timeout: 10m
          script: |
            set -e
            echo "🚀 Deploying to STAGING..."
            
            cd /opt/agora-studio-staging || git clone https://github.com/VentureHomeSolarLLC/agora-studio.git /opt/agora-studio-staging
            cd /opt/agora-studio-staging
            git fetch origin develop
            git reset --hard origin/develop
            
            cd site
            npm ci
            
            cat > .env.local << 'EOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=https://staging.help.venturehome.com
            ALLOWED_DOMAIN=venturehome.com
            OPENAI_API_KEY=${{ secrets.OPEN_API_KEY }}
            ENGRAM_TEST_REPO_PATH=${{ secrets.ENGRAM_TEST_REPO_PATH }}
            OPENCLAW_TOKEN=${{ secrets.OPENCLAW_TOKEN }}
            OPENCLAW_ENDPOINT=${{ secrets.OPENCLAW_ENDPOINT }}
            OPENCLAW_RUN_PATH=${{ secrets.OPENCLAW_RUN_PATH }}
            GRAPH_TENANT_ID=${{ secrets.GRAPH_TENANT_ID }}
            GRAPH_CLIENT_ID=${{ secrets.GRAPH_CLIENT_ID }}
            GRAPH_CLIENT_SECRET=${{ secrets.GRAPH_CLIENT_SECRET }}
            GRAPH_SCOPE=${{ secrets.GRAPH_SCOPE }}
            GRAPH_MAILBOX=${{ secrets.GRAPH_MAILBOX }}
            SALESFORCE_CLIENT_ID=${{ secrets.SALESFORCE_CLIENT_ID }}
            SALESFORCE_CLIENT_SECRET=${{ secrets.SALESFORCE_CLIENT_SECRET }}
            SALESFORCE_OAUTH_URL=${{ secrets.SALESFORCE_OAUTH_URL }}
            SALESFORCE_API_VERSION=${{ secrets.SALESFORCE_API_VERSION }}
            GOG_ACCOUNT=${{ secrets.GOG_ACCOUNT }}
            GOOGLE_TEST_SHEET_ID=${{ secrets.GOOGLE_TEST_SHEET_ID }}
            EOF
            
            echo "🔨 Building..."
            npm run build
            
            echo "🔄 Starting staging server..."
            pm2 restart agora-studio-staging || pm2 start npm --name "agora-studio-staging" -- start
            pm2 save
            
            echo "✅ Staging deployment complete at $(date)"
            pm2 status
