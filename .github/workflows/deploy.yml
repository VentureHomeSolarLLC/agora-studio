name: Deploy Agora Studio

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'concepts/**'
      - 'engrams/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Update code
            cd /opt/agora-studio || git clone https://github.com/VentureHomeSolarLLC/agora-studio.git /opt/agora-studio
            cd /opt/agora-studio
            git pull origin main
            
            # Setup site
            cd site
            npm ci
            
            # Create env file from secrets
            cat > .env.local << 'EOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            ALLOWED_DOMAIN=${{ secrets.ALLOWED_DOMAIN }}
            EOF
            
            # Build
            npm run build
            
            # Restart with PM2
            pm2 restart agora-studio || pm2 start npm --name "agora-studio" -- start
            pm2 save
            
            echo "✅ Deployment complete at $(date)"
