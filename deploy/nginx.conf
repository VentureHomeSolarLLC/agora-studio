# Agora Studio Nginx Configuration
# Place in /etc/nginx/sites-available/help.venturehome.com
# Then symlink: ln -s /etc/nginx/sites-available/help.venturehome.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name help.venturehome.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name help.venturehome.com;
    
    # SSL certificates (adjust paths as needed)
    ssl_certificate /etc/letsencrypt/live/help.venturehome.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/help.venturehome.com/privkey.pem;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Proxy to Next.js app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (for HMR in dev, not needed in prod but harmless)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Static files caching
    location /_next/static {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }
}
